<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShareAI API 管理后台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5/dist/reset.css" />
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/antd@5/dist/antd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ant-design/icons@5/dist/index.umd.min.js"></script>
    <style>
      :root {
        --page-bg: #f4f6f8;
        --panel: #ffffff;
        --panel-soft: #f8fafc;
        --line: #e4e7ec;
        --ink: #101828;
        --muted: #667085;
        --muted-2: #98a2b3;
        --brand: #1677ff;
        --brand-soft: #eaf2ff;
        --success: #16a34a;
        --warning: #d97706;
        --danger: #dc2626;
        --shadow: 0 18px 45px rgba(16, 24, 40, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        background: var(--page-bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      }

      .boot-screen,
      .login-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(135deg, rgba(22, 119, 255, 0.08), transparent 36%),
          var(--page-bg);
      }

      .login-panel {
        width: min(420px, 100%);
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: var(--shadow);
      }

      .login-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 22px;
      }

      .login-title {
        margin: 0;
        font-size: 20px;
        line-height: 1.2;
      }

      .login-subtitle {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .update-output {
        max-height: 420px;
        margin: 0;
        overflow: auto;
        padding: 12px;
        border: 1px solid #1f2937;
        border-radius: 8px;
        background: #101828;
        color: #d1fadf;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        min-height: 70px;
        padding: 0 28px;
        border-bottom: 1px solid rgba(228, 231, 236, 0.92);
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(18px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border-radius: 8px;
        color: #fff;
        background: #111827;
        font-weight: 800;
      }

      .brand-title {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
      }

      .brand-subtitle {
        margin: 3px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      .content {
        width: min(1560px, calc(100% - 32px));
        margin: 20px auto 34px;
      }

      .metrics-grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 14px;
      }

      .metric {
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 86px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .metric-icon {
        display: grid;
        place-items: center;
        flex: 0 0 38px;
        width: 38px;
        height: 38px;
        border-radius: 8px;
        color: var(--brand);
        background: var(--brand-soft);
        font-size: 18px;
      }

      .metric-label {
        color: var(--muted);
        font-size: 12px;
      }

      .metric-value {
        margin-top: 5px;
        font-size: 22px;
        font-weight: 760;
        line-height: 1;
      }

      .workspace {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
        align-items: start;
      }

      .panel {
        min-width: 0;
        overflow: visible;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        min-height: 62px;
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
      }

      .panel-title {
        margin: 0;
        font-size: 16px;
        font-weight: 760;
      }

      .panel-desc {
        margin: 3px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      .table-wrap {
        min-width: 0;
        overflow: visible;
        padding: 14px 18px 18px;
      }

      .filters {
        display: grid;
        grid-template-columns: minmax(240px, 1fr) 160px 160px auto;
        gap: 10px;
        margin-bottom: 12px;
      }

      .channel-name-cell {
        min-width: 0;
      }

      .primary-text {
        color: var(--ink);
        font-weight: 720;
      }

      .secondary-text {
        margin-top: 3px;
        color: var(--muted);
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .mono {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .detail-body {
        min-width: 0;
        overflow: visible;
        padding: 16px 18px 18px;
      }

      .detail-hero {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--line);
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin: 14px 0;
      }

      .detail-stat {
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-soft);
      }

      .detail-stat-label {
        color: var(--muted);
        font-size: 12px;
      }

      .detail-stat-value {
        margin-top: 4px;
        font-size: 18px;
        font-weight: 760;
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 10px 0 12px;
      }

      .section-title h3 {
        margin: 0;
        font-size: 14px;
      }

      .operations {
        margin-top: 14px;
      }

      .operation-body {
        min-width: 0;
        overflow: visible;
        padding: 14px 18px 18px;
      }

      .task-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0 12px;
      }

      .model-route-list {
        display: grid;
        gap: 10px;
      }

      .model-route-row {
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8fafc;
      }

      .model-route-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .model-route-title {
        font-size: 13px;
        font-weight: 760;
      }

      .model-route-grid {
        display: grid;
        grid-template-columns: 1fr 1.2fr 76px;
        gap: 0 10px;
      }

      .model-tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .code-box {
        margin: 0;
        padding: 14px;
        overflow: visible;
        border: 1px solid #1f2937;
        border-radius: 8px;
        background: #101828;
        color: #d1fadf;
        font-size: 12px;
        line-height: 1.65;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .api-doc-stack {
        display: grid;
        gap: 14px;
      }

      .api-doc-section {
        display: grid;
        gap: 10px;
      }

      .api-doc-title {
        margin: 0;
        font-size: 14px;
        font-weight: 760;
      }

      .api-doc-copy {
        margin: -4px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      .task-thumb {
        width: 86px;
        height: 62px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #f2f4f7;
      }

      .task-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .toolbar-note {
        color: var(--muted);
        font-size: 12px;
      }

      .error-text {
        margin-top: 4px;
        color: var(--danger);
        font-size: 12px;
        line-height: 1.45;
      }

      .task-error-detail {
        max-width: 980px;
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .task-error-detail summary {
        cursor: pointer;
        color: #475569;
        user-select: none;
      }

      .task-error-detail pre {
        max-height: 180px;
        margin: 6px 0 0;
        overflow: auto;
        padding: 10px;
        border: 1px solid #fee2e2;
        border-radius: 8px;
        background: #fff7f7;
        color: #991b1b;
        white-space: pre-wrap;
      }

      .task-response {
        max-width: 680px;
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
      }

      .task-json-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(260px, 1fr));
        gap: 8px;
        max-width: 980px;
        margin-top: 8px;
      }

      .task-json-panel {
        min-width: 0;
        overflow: hidden;
        border: 1px solid #1f2937;
        border-radius: 8px;
        background: #101828;
      }

      .task-json-title {
        padding: 7px 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.09);
        color: #e5e7eb;
        background: #111827;
        font-size: 12px;
        font-weight: 760;
      }

      .task-json-code {
        max-height: 260px;
        margin: 0;
        overflow: auto;
        padding: 10px;
        color: #d1fadf;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 11px;
        line-height: 1.5;
        white-space: pre;
        tab-size: 2;
      }

      @media (max-width: 1320px) {
        .metrics-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .workspace {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 780px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
          padding: 14px 18px;
        }

        .content {
          width: min(100% - 20px, 760px);
          margin-top: 12px;
        }

        .metrics-grid,
        .detail-grid,
        .form-grid,
        .model-route-grid {
          grid-template-columns: 1fr;
        }

        .filters {
          grid-template-columns: 1fr;
        }

        .task-json-grid {
          grid-template-columns: 1fr;
        }

        .panel-header,
        .detail-hero {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const { useEffect, useMemo, useState } = React;
      const {
        Alert,
        Button,
        Col,
        ConfigProvider,
        Empty,
        Form,
        Image,
        Input,
        InputNumber,
        message,
        Modal,
        Popconfirm,
        Row,
        Select,
        Space,
        Spin,
        Switch,
        Table,
        Tabs,
        Tag,
        Tooltip,
        Typography,
        Upload
      } = antd;
      const Icon = window.icons || {};
      const h = React.createElement;

      const channelTypeOptions = [
        { label: "聊天生图", value: "chatplus" },
        { label: "绘图站", value: "drawing" }
      ];

      const fallbackModelOptions = [
        { label: "ChatGPT-Image-2 / 默认", value: 1 },
        { label: "Nano-Banana-Pro", value: 2 },
        { label: "Nano-Banana", value: 3 }
      ];

      const chatModelDefaults = [
        { key: "gpt", name: "GPT", carType: "chatgpt", model: "gpt-5-5-instant", strategy: "balanced", enabled: true, default: true },
        { key: "grok", name: "Grok", carType: "grok", model: "", strategy: "balanced", enabled: true, default: false },
        { key: "gemini", name: "Gemini", carType: "gemini", model: "", strategy: "thinking", enabled: true, default: false }
      ];

      const chatStrategyOptions = [
        { label: "智能随机", value: "balanced" },
        { label: "空闲优先", value: "idle" },
        { label: "绘图额度优先", value: "image" },
        { label: "思考能力优先", value: "thinking" },
        { label: "低负载优先", value: "speed" }
      ];

      async function api(path, options = {}) {
        const isForm = options.body instanceof FormData;
        const hasBody = options.body !== undefined && options.body !== null;
        const body = hasBody && !isForm && typeof options.body !== "string" ? JSON.stringify(options.body) : options.body;
        const response = await fetch(path, {
          ...options,
          body,
          headers: {
            ...(hasBody && !isForm ? { "content-type": "application/json" } : {}),
            ...(options.headers || {})
          }
        });
        const data = await response.json().catch(() => null);
        if (!response.ok || data?.ok === false) throw new Error(data?.message || "请求失败");
        return data?.data ?? data;
      }

      function numberValue(value) {
        const next = Number(value);
        return Number.isFinite(next) ? next : 0;
      }

      function valueText(value) {
        return value === null || value === undefined || value === "" ? "-" : value;
      }

      function prettyJson(value) {
        if (value === null || value === undefined || value === "") return "";
        try {
          const parsed = typeof value === "string" ? JSON.parse(value) : value;
          return JSON.stringify(parsed, null, 2);
        } catch (_error) {
          return String(value);
        }
      }

      function isChatLoginErrorText(value) {
        return /\b(401|403)\b|身份验证失败|请重新登录|重新登陆|未登录|未登陆|其他设备登|聊天站登录状态/.test(String(value || ""));
      }

      function taskErrorText(row) {
        const text = row?.errorMessage || row?.responseJson?.message || "";
        if (!text) return "";
        if (isChatLoginErrorText(text)) {
          return "聊天站登录状态没有完整通过，系统已自动重登和换车，但仍失败。请检测聊天账号后重试。";
        }
        return text;
      }

      function taskRawErrorText(row) {
        const text = row?.errorMessage || row?.responseJson?.message || "";
        return text && text !== taskErrorText(row) ? text : "";
      }

      function taskReturnJson(row) {
        if (row.status === "failed" && (row.responseJson || row.errorMessage)) {
          return { ok: false, message: taskErrorText(row) || "任务失败" };
        }
        if (row.responseJson) return row.responseJson;
        if (row.errorMessage) return { ok: false, message: row.errorMessage, attempts: row.attempts || [] };
        if (row.responseText) return { content: row.responseText };
        if (row.raw && row.raw.queued !== true) return row.raw;
        return null;
      }

      function taskJsonPanel(title, value) {
        const text = prettyJson(value);
        return text
          ? h("div", { className: "task-json-panel", key: title }, [
              h("div", { className: "task-json-title", key: "title" }, title),
              h("pre", { className: "task-json-code", key: "code" }, text)
            ])
          : null;
      }

      function taskJsonGrid(row) {
        const panels = [
          taskJsonPanel("发送 JSON", row.requestJson),
          taskJsonPanel("返回 JSON", taskReturnJson(row))
        ].filter(Boolean);
        return panels.length ? h("div", { className: "task-json-grid" }, panels) : null;
      }

      function formatDateTime(value) {
        if (value === null || value === undefined || value === "") return "-";
        const date = new Date(value);
        if (!Number.isFinite(date.getTime())) return value;
        return date.toLocaleString("zh-CN", {
          timeZone: "Asia/Shanghai",
          hour12: false,
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        }).replace(/\//g, "-");
      }

      function accountQuotaText(account, channel) {
        const balance = numberValue(account.balance ?? account.quota);
        const quota = numberValue(account.quota);
        if (channel?.type === "chatplus") return account.status === "unknown" ? "-" : `剩余 ${balance}`;
        return `${quota}/${balance}`;
      }

      function channelQuotaText(channel, stats = {}) {
        if (channel?.type === "chatplus") return `剩余 ${numberValue(stats.balance)}`;
        return `${numberValue(stats.quota)}/${numberValue(stats.balance)}`;
      }

      function channelTypeName(type) {
        return channelTypeOptions.find((item) => item.value === type)?.label || type || "-";
      }

      function channelBaseUrl(channel) {
        return channel?.settings?.baseUrl || "-";
      }

      function chatModelKey(value) {
        return String(value || "").trim().toLowerCase();
      }

      function chatModelsForChannel(channel) {
        const settings = channel?.settings || {};
        const source = Array.isArray(settings.chatModels) && settings.chatModels.length ? settings.chatModels : chatModelDefaults;
        const defaultKey = chatModelKey(settings.defaultChatModel) || source.find((item) => item.default)?.key || "gpt";
        return source.map((item, index) => {
          const fallback = chatModelDefaults[index] || {};
          const key = chatModelKey(item?.key || fallback.key || `model-${index + 1}`);
          return {
            key,
            name: item?.name || fallback.name || key,
            carType: item?.carType || fallback.carType || "",
            model: item?.model || fallback.model || "",
            strategy: item?.strategy || fallback.strategy || "balanced",
            enabled: item?.enabled !== false,
            default: key === defaultKey || item?.default === true
          };
        });
      }

      function chatModelSelectOptions(channel) {
        return chatModelsForChannel(channel)
          .filter((item) => item.enabled)
          .map((item) => ({ label: item.default ? `${item.name} / 默认` : item.name, value: item.key }));
      }

      function statusInfo(status) {
        const map = {
          ok: ["success", "可用"],
          error: ["error", "异常"],
          success: ["success", "成功"],
          failed: ["error", "失败"],
          cancelled: ["default", "已取消"],
          processing: ["processing", "处理中"],
          disabled: ["default", "已停用"],
          empty: ["warning", "未绑定账号"],
          unknown: ["default", "未检测"]
        };
        return map[status] || ["processing", status || "处理中"];
      }

      function statusTag(status) {
        const [color, text] = statusInfo(status);
        return h(Tag, { color }, text);
      }

      function taskTypeLabel(type) {
        const map = {
          chat: "对话",
          img2img: "图生图",
          text2img: "文生图"
        };
        return map[type] || type || "-";
      }

      function formatDuration(ms) {
        if (!Number.isFinite(ms) || ms < 0) return "-";
        const totalSeconds = Math.max(0, Math.floor(ms / 1000));
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        if (hours) return `${hours}时${minutes}分${seconds}秒`;
        if (minutes) return `${minutes}分${seconds}秒`;
        return `${seconds}秒`;
      }

      function taskDuration(task, now) {
        const start = Date.parse(task.createdAt || task.raw?.created_at || "");
        if (!Number.isFinite(start)) return "-";
        const done = ["success", "failed", "cancelled"].includes(task.status)
          ? Date.parse(task.completedAt || task.updatedAt || "")
          : now;
        if (!Number.isFinite(done)) return "-";
        const text = formatDuration(done - start);
        return ["success", "failed", "cancelled"].includes(task.status) ? text : `已耗时 ${text}`;
      }

      function channelName(config, channelId) {
        return config?.channels?.find((item) => item.id === channelId)?.name || channelId || "-";
      }

      function getChannelStatus(channel, relatedAccounts) {
        if (channel.enabled === false) return "disabled";
        if (!relatedAccounts.length) return "empty";
        if (relatedAccounts.some((item) => item.enabled !== false && item.status === "ok")) return "ok";
        if (relatedAccounts.every((item) => item.status === "error" || item.status === "failed")) return "error";
        return "unknown";
      }

      function getChannelStats(channel, accounts) {
        const related = accounts.filter((item) => item.channelId === channel.id);
        const enabled = related.filter((item) => item.enabled !== false);
        return {
          accountCount: related.length,
          enabledCount: enabled.length,
          okCount: related.filter((item) => item.status === "ok").length,
          quota: related.reduce((sum, item) => sum + numberValue(item.quota), 0),
          balance: related.reduce((sum, item) => sum + numberValue(item.balance ?? item.quota), 0),
          status: getChannelStatus(channel, related)
        };
      }

      function LoginScreen({ onLogin }) {
        const [form] = Form.useForm();
        const [submitting, setSubmitting] = useState(false);

        async function submit(values) {
          setSubmitting(true);
          try {
            const user = await api("/api/auth/login", { method: "POST", body: values });
            message.success("登录成功");
            onLogin(user);
          } catch (error) {
            message.error(error.message);
          } finally {
            setSubmitting(false);
          }
        }

        return h("main", { className: "login-shell" }, [
          h("section", { className: "login-panel" }, [
            h("div", { className: "login-brand" }, [
              h("div", { className: "brand-mark" }, "AI"),
              h("div", null, [
                h("h1", { className: "login-title" }, "ShareAI 后台登录"),
                h("p", { className: "login-subtitle" }, "登录后才能查看账号、密钥和任务记录")
              ])
            ]),
            h(Form, { form, layout: "vertical", initialValues: { username: "lixiang" }, onFinish: submit }, [
              h(Form.Item, { label: "账号", name: "username", rules: [{ required: true, message: "请输入账号" }] },
                h(Input, { autoComplete: "username", prefix: Icon.UserOutlined ? h(Icon.UserOutlined) : null })
              ),
              h(Form.Item, { label: "密码", name: "password", rules: [{ required: true, message: "请输入密码" }] },
                h(Input.Password, { autoComplete: "current-password", prefix: Icon.LockOutlined ? h(Icon.LockOutlined) : null })
              ),
              h(Button, {
                block: true,
                type: "primary",
                htmlType: "submit",
                loading: submitting,
                icon: Icon.LoginOutlined ? h(Icon.LoginOutlined) : null
              }, "登录后台")
            ])
          ])
        ]);
      }

      function App() {
        const [checking, setChecking] = useState(true);
        const [adminUser, setAdminUser] = useState(null);

        useEffect(() => {
          api("/api/auth/status")
            .then((data) => {
              if (data?.authenticated) setAdminUser(data.user);
            })
            .catch(() => {})
            .finally(() => setChecking(false));
        }, []);

        async function logout() {
          try {
            await api("/api/auth/logout", { method: "POST", body: {} });
          } catch (_error) {
          }
          setAdminUser(null);
          message.success("已退出");
        }

        if (checking) {
          return h("main", { className: "boot-screen" }, h(Spin, { size: "large" }));
        }

        return adminUser
          ? h(Dashboard, { adminUser, onLogout: logout })
          : h(LoginScreen, { onLogin: setAdminUser });
      }

      function Dashboard({ adminUser, onLogout }) {
        const [config, setConfig] = useState(null);
        const [tasks, setTasks] = useState([]);
        const [loading, setLoading] = useState(false);
        const [updating, setUpdating] = useState(false);
        const [nowTick, setNowTick] = useState(Date.now());
        const [chatFileList, setChatFileList] = useState([]);
        const [editFileList, setEditFileList] = useState([]);
        const [chatResult, setChatResult] = useState("");
        const [chatSubmitting, setChatSubmitting] = useState(false);
        const [drawingModels, setDrawingModels] = useState([]);
        const [selectedChannelId, setSelectedChannelId] = useState(null);
        const [searchText, setSearchText] = useState("");
        const [typeFilter, setTypeFilter] = useState("all");
        const [statusFilter, setStatusFilter] = useState("all");
        const [channelModalOpen, setChannelModalOpen] = useState(false);
        const [accountModalOpen, setAccountModalOpen] = useState(false);
        const [editingChannel, setEditingChannel] = useState(null);
        const [editingAccount, setEditingAccount] = useState(null);

        const [chatForm] = Form.useForm();
        const [editForm] = Form.useForm();
        const [channelForm] = Form.useForm();
        const [accountForm] = Form.useForm();
        const [globalForm] = Form.useForm();
        const editingChannelType = Form.useWatch("type", channelForm);
        const selectedChatChannelValue = Form.useWatch("channel", chatForm);
        const selectedEditChannelValue = Form.useWatch("channel", editForm);

        const channels = config?.channels || [];
        const accounts = config?.accounts || [];
        const chatChannels = channels.filter((item) => item.type === "chatplus");
        const selectedChannel = channels.find((item) => item.id === selectedChannelId) || channels[0] || null;
        const selectedAccounts = selectedChannel ? accounts.filter((item) => item.channelId === selectedChannel.id) : [];

        const channelOptions = useMemo(() => [
          { label: "自动选择", value: "auto" },
          ...channels.map((item) => ({ label: item.name, value: item.id }))
        ], [channels]);

        const chatChannelOptions = useMemo(() => [
          { label: "自动选择", value: "auto" },
          ...chatChannels.map((item) => ({ label: item.name, value: item.id }))
        ], [chatChannels]);

        const chatTestModelOptions = useMemo(() => {
          const selected = selectedChatChannelValue && selectedChatChannelValue !== "auto"
            ? chatChannels.find((item) => item.id === selectedChatChannelValue)
            : null;
          const source = selected
            ? chatModelSelectOptions(selected)
            : [...new Map(chatChannels.flatMap(chatModelSelectOptions).map((item) => [item.value, item])).values()];
          return [{ label: "自动使用渠道默认", value: "" }, ...source];
        }, [chatChannels, selectedChatChannelValue]);

        const drawingModelOptions = useMemo(() => {
          const items = Array.isArray(drawingModels) && drawingModels.length ? drawingModels : fallbackModelOptions;
          return items.map((item) => {
            if (item.label && item.value !== undefined) return item;
            const value = Number(item.id ?? item.value ?? item.model_id ?? item.modelId);
            const name = item.name || item.title || item.code || `模型 ${value}`;
            const code = item.code || item.model || "";
            return {
              label: code ? `${name} / ${code}` : name,
              value
            };
          }).filter((item) => Number.isFinite(Number(item.value)));
        }, [drawingModels]);

        function defaultModelForChannel(channelId, sourceChannels = channels, sourceConfig = config) {
          const channel = sourceChannels.find((item) => item.id === channelId);
          return channel?.settings?.defaultModelId || sourceConfig?.defaultModelId || 1;
        }

        function accountIsCooling(account) {
          const until = Date.parse(account?.cooldownUntil || "");
          return Number.isFinite(until) && until > Date.now();
        }

        function accountCooldownText(account) {
          const ms = Math.max(0, Date.parse(account?.cooldownUntil || "") - Date.now());
          return `${Math.max(1, Math.ceil(ms / 60000))} 分钟`;
        }

        const matchingChatAccounts = useMemo(() => {
          const chatIds = new Set(chatChannels.map((item) => item.id));
          return accounts.filter((account) => {
            if (account.enabled === false || !chatIds.has(account.channelId)) return false;
            return !selectedChatChannelValue || selectedChatChannelValue === "auto" || account.channelId === selectedChatChannelValue;
          });
        }, [accounts, chatChannels, selectedChatChannelValue]);

        const coolingChatAccount = useMemo(() => matchingChatAccounts.find(accountIsCooling) || null, [matchingChatAccounts, nowTick]);
        const chatSubmitBlocked = matchingChatAccounts.length > 0 && matchingChatAccounts.every(accountIsCooling);

        const channelStats = useMemo(() => {
          const map = new Map();
          channels.forEach((channel) => map.set(channel.id, getChannelStats(channel, accounts)));
          return map;
        }, [channels, accounts]);

        const filteredChannels = useMemo(() => {
          const keyword = searchText.trim().toLowerCase();
          return channels.filter((channel) => {
            const stats = channelStats.get(channel.id) || {};
            const haystack = `${channel.name} ${channel.id} ${channelBaseUrl(channel)}`.toLowerCase();
            const keywordOk = !keyword || haystack.includes(keyword);
            const typeOk = typeFilter === "all" || channel.type === typeFilter;
            const statusOk = statusFilter === "all" || stats.status === statusFilter;
            return keywordOk && typeOk && statusOk;
          });
        }, [channels, channelStats, searchText, typeFilter, statusFilter]);

        const totals = useMemo(() => {
          const enabledChannels = channels.filter((item) => item.enabled !== false).length;
          const okAccounts = accounts.filter((item) => item.enabled !== false && item.status === "ok").length;
          const balance = accounts.reduce((sum, item) => sum + numberValue(item.balance ?? item.quota), 0);
          const successCount = tasks.filter((item) => item.status === "success").length;
          const failedCount = tasks.filter((item) => item.status === "failed").length;
          return { enabledChannels, okAccounts, balance, successCount, failedCount };
        }, [channels, accounts, tasks]);

        async function refresh() {
          const [nextConfig, taskList, modelData] = await Promise.all([
            api("/api/config"),
            api("/api/tasks"),
            api("/api/models").catch(() => ({ items: [] }))
          ]);
          setConfig(nextConfig);
          setTasks(taskList);
          setDrawingModels(Array.isArray(modelData?.items) ? modelData.items : []);
          globalForm.setFieldsValue(nextConfig);
          const defaultChatChannel = nextConfig.channels?.some((item) => item.id === nextConfig.defaultChannel && item.type === "chatplus")
            ? nextConfig.defaultChannel
            : "auto";
          chatForm.setFieldsValue({
            channel: defaultChatChannel,
            model: ""
          });
          editForm.setFieldsValue({
            channel: nextConfig.defaultChannel || "auto",
            model_id: defaultModelForChannel(nextConfig.defaultChannel, nextConfig.channels || [], nextConfig),
            ratio_label: nextConfig.defaultRatio || "1:1",
            image_count: 1
          });
        }

        useEffect(() => {
          refresh().catch((error) => message.error(error.message));
        }, []);

        useEffect(() => {
          if (!selectedChannelId && channels[0]) setSelectedChannelId(channels[0].id);
          if (selectedChannelId && channels.length && !channels.some((item) => item.id === selectedChannelId)) {
            setSelectedChannelId(channels[0].id);
          }
        }, [channels, selectedChannelId]);

        useEffect(() => {
          const value = chatForm.getFieldValue("model");
          if (value && !chatTestModelOptions.some((item) => item.value === value)) {
            chatForm.setFieldValue("model", "");
          }
        }, [chatForm, chatTestModelOptions]);

        useEffect(() => {
          if (!selectedEditChannelValue) return;
          const nextModel = defaultModelForChannel(selectedEditChannelValue);
          if (nextModel) editForm.setFieldValue("model_id", nextModel);
        }, [selectedEditChannelValue, channels, config]);

        useEffect(() => {
          if (!tasks.some((item) => ["processing", "queued", "pending", "unknown"].includes(item.status))) return undefined;
          const timer = setInterval(async () => {
            try {
              await api("/api/tasks/refresh-processing", { method: "POST", body: {} });
              const taskList = await api("/api/tasks");
              setTasks(taskList);
            } catch (_error) {
              // 下一轮继续刷新，避免临时网络波动打断页面。
            }
          }, 5000);
          return () => clearInterval(timer);
        }, [tasks]);

        useEffect(() => {
          if (!tasks.some((item) => ["processing", "queued", "pending", "unknown"].includes(item.status))) return undefined;
          const timer = setInterval(() => setNowTick(Date.now()), 1000);
          return () => clearInterval(timer);
        }, [tasks]);

        async function saveGlobal(values) {
          setLoading(true);
          try {
            setConfig(await api("/api/config", { method: "POST", body: values }));
            message.success("设置已保存");
          } catch (error) {
            message.error(error.message);
          } finally {
            setLoading(false);
          }
        }

        async function patchChannel(channel, patch) {
          try {
            setConfig(await api(`/api/channels/${channel.id}`, { method: "POST", body: patch }));
            message.success("渠道已更新");
          } catch (error) {
            message.error(error.message);
          }
        }

        function openChannelModal(channel) {
          setEditingChannel(channel || null);
          channelForm.resetFields();
          const chatModels = chatModelsForChannel(channel);
          const defaultChatModel = chatModels.find((item) => item.default)?.key || "gpt";
          channelForm.setFieldsValue(channel ? {
            ...channel,
            settings: {
              ...(channel.settings || {}),
              defaultChatModel,
              chatModels
            }
          } : {
            name: "",
            type: "drawing",
            enabled: true,
            priority: channels.length + 1,
            settings: { baseUrl: "", defaultModelId: config?.defaultModelId || 1, defaultChatModel: "gpt", chatModels: chatModelDefaults }
          });
          setChannelModalOpen(true);
        }

        async function saveChannel(values) {
          setLoading(true);
          try {
            const beforeIds = new Set(channels.map((item) => item.id));
            const path = editingChannel ? `/api/channels/${editingChannel.id}` : "/api/channels";
            const nextConfig = await api(path, { method: "POST", body: values });
            setConfig(nextConfig);
            const added = nextConfig.channels.find((item) => !beforeIds.has(item.id));
            setSelectedChannelId(editingChannel?.id || added?.id || selectedChannelId);
            setChannelModalOpen(false);
            setEditingChannel(null);
            message.success(editingChannel ? "渠道已保存" : "渠道已新增");
          } catch (error) {
            message.error(error.message);
          } finally {
            setLoading(false);
          }
        }

        async function deleteChannel(id) {
          setLoading(true);
          try {
            const nextConfig = await api(`/api/channels/${id}`, { method: "DELETE" });
            setConfig(nextConfig);
            setSelectedChannelId(nextConfig.channels[0]?.id || null);
            message.success("渠道已删除");
          } catch (error) {
            message.error(error.message);
          } finally {
            setLoading(false);
          }
        }

        function openAccountModal(account) {
          setEditingAccount(account || null);
          accountForm.resetFields();
          accountForm.setFieldsValue(account
            ? { ...account, password: "" }
            : { channelId: selectedChannel?.id, name: "", username: "", password: "", priority: 1, enabled: true }
          );
          setAccountModalOpen(true);
        }

        async function saveAccount(values) {
          setLoading(true);
          try {
            const channelId = editingAccount?.channelId || values.channelId || selectedChannel?.id;
            const payload = { ...editingAccount, ...values, channelId };
            const nextConfig = await api("/api/accounts", { method: "POST", body: payload });
            setConfig(nextConfig);
            setSelectedChannelId(channelId || selectedChannelId);
            setAccountModalOpen(false);
            setEditingAccount(null);
            message.success("账号已保存");
          } catch (error) {
            message.error(error.message);
          } finally {
            setLoading(false);
          }
        }

        async function deleteAccount(id) {
          try {
            setConfig(await api(`/api/accounts/${id}`, { method: "DELETE" }));
            message.success("账号已删除");
          } catch (error) {
            message.error(error.message);
          }
        }

        async function testAccount(id) {
          setLoading(true);
          try {
            await api(`/api/accounts/${id}/test`, { method: "POST" });
            await refresh();
            message.success("检测完成");
          } catch (error) {
            await refresh().catch(() => {});
            message.error(error.message);
          } finally {
            setLoading(false);
          }
        }

        async function testChannel(channelId) {
          const related = accounts.filter((item) => item.channelId === channelId);
          if (!related.length) {
            message.warning("这个渠道还没有绑定账号");
            return;
          }
          setLoading(true);
          let ok = 0;
          let failed = 0;
          for (const account of related) {
            try {
              await api(`/api/accounts/${account.id}/test`, { method: "POST" });
              ok += 1;
            } catch (_error) {
              failed += 1;
            }
          }
          await refresh().catch(() => {});
          setLoading(false);
          message.info(`检测完成：${ok} 个可用，${failed} 个异常`);
        }

        async function testAll() {
          setLoading(true);
          try {
            await api("/api/accounts/test-all", { method: "POST" });
            await refresh();
            message.success("全部账号检测完成");
          } catch (error) {
            await refresh().catch(() => {});
            message.error(error.message);
          } finally {
            setLoading(false);
          }
        }

        function showUpdateResult(result) {
          const output = [
            result?.message ? `结果：${result.message}` : "",
            result?.stdout ? `输出：\n${result.stdout}` : "",
            result?.stderr ? `提示：\n${result.stderr}` : ""
          ].filter(Boolean).join("\n\n") || "更新命令执行完成，没有返回内容。";
          Modal.info({
            title: result?.success ? "更新完成" : "更新未完成",
            width: 760,
            content: h("pre", { className: "update-output" }, output)
          });
        }

        function runUpdate() {
          Modal.confirm({
            title: "更新线上代码",
            content: "会执行服务器 .env 里配置好的更新命令，不会保存服务器密码。",
            okText: "开始更新",
            cancelText: "取消",
            onOk: async () => {
              setUpdating(true);
              try {
                const result = await api("/api/admin/update", { method: "POST", body: {} });
                if (result?.success) message.success("更新完成");
                else message.error(result?.message || "更新失败");
                showUpdateResult(result);
              } catch (error) {
                message.error(error.message);
              } finally {
                setUpdating(false);
              }
            }
          });
        }

        async function submitChat(values) {
          if (chatSubmitting) return;
          if (chatSubmitBlocked) {
            message.warning(`聊天账号冷却中，约 ${accountCooldownText(coolingChatAccount)} 后再试`);
            return;
          }
          const text = String(values.message || "").trim();
          if (!text && !chatFileList.length) {
            message.warning("请输入对话内容，或上传图片");
            return;
          }
          if (chatFileList.length > 5) {
            message.warning("对话最多上传 5 张图");
            return;
          }
          setChatSubmitting(true);
          setLoading(true);
          try {
            const headers = { Authorization: `Bearer ${config?.apiKey || ""}` };
            const body = chatFileList.length
              ? (() => {
                  const form = new FormData();
                  form.append("message", text);
                  form.append("channel", values.channel || "auto");
                  if (values.model) form.append("model", values.model);
                  chatFileList.forEach((file) => form.append("image", file.originFileObj));
                  return form;
                })()
              : {
                  message: text,
                  channel: values.channel || "auto",
                  ...(values.model ? { model: values.model } : {})
                };
            const result = await api("/v1/chat/completions?wait=0", { method: "POST", headers, body });
            if (result.task) {
              setTasks((current) => [result.task, ...current.filter((item) => String(item.id) !== String(result.task.id))]);
            }
            setChatResult("");
            message.success("对话已提交，任务记录里查看结果和耗时");
          } catch (error) {
            message.error(error.message);
          } finally {
            setChatSubmitting(false);
            setLoading(false);
          }
        }

        async function submitEdit(values) {
          if (!editFileList.length) {
            message.warning("先上传 1 到 3 张源图");
            return;
          }
          if (editFileList.length > 3) {
            message.warning("图生图最多上传 3 张源图");
            return;
          }
          setLoading(true);
          try {
            const form = new FormData();
            Object.entries(values).forEach(([key, value]) => form.append(key, value ?? ""));
            editFileList.forEach((file) => form.append("image", file.originFileObj));
            const task = await api("/api/draw/edit", { method: "POST", body: form });
            setTasks((current) => [task, ...current.filter((item) => String(item.id) !== String(task.id))]);
            message.success(`已提交到 ${task.channelName}，后台生成中`);
          } catch (error) {
            message.error(error.message);
          } finally {
            setLoading(false);
          }
        }

        async function refreshProcessing() {
          setLoading(true);
          try {
            const results = await api("/api/tasks/refresh-processing", { method: "POST", body: {} });
            await refresh();
            if (!results.length) message.info("没有需要刷新的任务");
            else message.success(`已刷新 ${results.length} 个任务`);
          } catch (error) {
            message.error(error.message);
          } finally {
            setLoading(false);
          }
        }

        const publicApiBaseUrl = window.location.origin;
        const chatApiUrl = `${publicApiBaseUrl}/v1/chat/completions`;
        const editApiUrl = `${publicApiBaseUrl}/v1/images/edits`;

        async function copyText(text, successText) {
          try {
            await navigator.clipboard.writeText(text || "");
            message.success(successText);
          } catch (_error) {
            message.warning("浏览器不允许自动复制，可以手动选中复制");
          }
        }

        async function copyApiKey() {
          await copyText(config?.apiKey || "", "密钥已复制");
        }

        async function copyPublicApiUrl() {
          await copyText(publicApiBaseUrl, "中转 API 地址已复制");
        }

        async function copyChatApiUrl() {
          await copyText(chatApiUrl, "对话接口已复制");
        }

        async function copyEditApiUrl() {
          await copyText(editApiUrl, "图生图接口已复制");
        }

        const channelColumns = [
          {
            title: "渠道",
            dataIndex: "name",
            width: 280,
            render: (_, row) => h("div", { className: "channel-name-cell" }, [
              h("div", { className: "primary-text", key: "name" }, row.name),
              h("div", { className: "secondary-text mono", key: "url" }, channelBaseUrl(row))
            ])
          },
          {
            title: "类型",
            dataIndex: "type",
            width: 110,
            render: (type) => h(Tag, { color: type === "chatplus" ? "blue" : "cyan" }, channelTypeName(type))
          },
          {
            title: "状态",
            width: 100,
            render: (_, row) => statusTag(channelStats.get(row.id)?.status)
          },
          {
            title: "账号",
            width: 118,
            render: (_, row) => {
              const stats = channelStats.get(row.id) || {};
              return h("span", null, `${stats.enabledCount || 0}/${stats.accountCount || 0} 启用`);
            }
          },
          {
            title: "额度",
            width: 130,
            render: (_, row) => {
              const stats = channelStats.get(row.id) || {};
              return h("span", null, channelQuotaText(row, stats));
            }
          },
          { title: "优先级", dataIndex: "priority", width: 90 },
          {
            title: "启用",
            dataIndex: "enabled",
            width: 90,
            render: (_, row) => h(Switch, {
              checked: row.enabled !== false,
              onChange: (checked) => patchChannel(row, { enabled: checked })
            })
          },
          {
            title: "操作",
            width: 230,
            render: (_, row) => h(Space, { size: 6 }, [
              h(Tooltip, { title: "检测这个渠道下的全部账号", key: "test" },
                h(Button, { size: "small", icon: Icon.CheckCircleOutlined ? h(Icon.CheckCircleOutlined) : null, loading, onClick: () => testChannel(row.id) }, "检测")
              ),
              h(Button, { size: "small", icon: Icon.EditOutlined ? h(Icon.EditOutlined) : null, onClick: () => openChannelModal(row), key: "edit" }, "编辑"),
              h(Popconfirm, {
                key: "delete",
                title: "删除这个渠道？",
                description: "删除后，这个渠道下面的账号也会一起删除。",
                okText: "删除",
                cancelText: "取消",
                onConfirm: () => deleteChannel(row.id)
              }, h(Button, { size: "small", danger: true, icon: Icon.DeleteOutlined ? h(Icon.DeleteOutlined) : null }, "删除"))
            ])
          }
        ];

        const accountColumns = [
          { title: "账号名称", dataIndex: "name", width: 130 },
          { title: "登录账号", dataIndex: "username", ellipsis: true },
          { title: "状态", dataIndex: "status", width: 90, render: statusTag },
          {
            title: "额度",
            width: 130,
            render: (_, row) => accountQuotaText(row, channels.find((item) => item.id === row.channelId))
          },
          { title: "重置/到期", dataIndex: "expireAt", width: 170, render: formatDateTime },
          {
            title: "启用",
            dataIndex: "enabled",

          },
          {
            title: "操作",
            width: 210,
            render: (_, row) => h(Space, { size: 6 }, [
              h(Button, { size: "small", onClick: () => testAccount(row.id), loading, icon: Icon.CheckCircleOutlined ? h(Icon.CheckCircleOutlined) : null }, "检测"),
              h(Button, { size: "small", onClick: () => openAccountModal(row), icon: Icon.EditOutlined ? h(Icon.EditOutlined) : null }, "编辑"),
              h(Popconfirm, { title: "删除这个账号？", okText: "删除", cancelText: "取消", onConfirm: () => deleteAccount(row.id) },
                h(Button, { size: "small", danger: true, icon: Icon.DeleteOutlined ? h(Icon.DeleteOutlined) : null }, "删除")
              )
            ])
          }
        ];

          ])),
          h(Modal, {
            title: editingAccount ? "编辑账号" : "新增账号",
            open: accountModalOpen,
            onCancel: () => setAccountModalOpen(false),
            onOk: () => accountForm.submit(),
            okText: editingAccount ? "保存账号" : "新增账号",
            cancelText: "取消",
            confirmLoading: loading,
            width: 620,
            destroyOnClose: true
          }, h(Form, { form: accountForm, layout: "vertical", onFinish: saveAccount }, [
            h("div", { className: "form-grid" }, [
              h(Form.Item, { label: "所属渠道", name: "channelId", rules: [{ required: true, message: "请选择渠道" }] }, h(Select, { disabled: true, options: channels.map((item) => ({ label: item.name, value: item.id })) })),
              h(Form.Item, { label: "账号名称", name: "name", rules: [{ required: true, message: "请输入账号名称" }] }, h(Input, { placeholder: "例如：账号 1" }))
            ]),
            h(Form.Item, { label: "登录账号", name: "username", rules: [{ required: true, message: "请输入登录账号" }] }, h(Input)),
            h(Form.Item, { label: "登录密码", name: "password" }, h(Input.Password, { placeholder: editingAccount?.hasPassword ? "不改密码就留空" : "请输入密码" })),
            h("div", { className: "form-grid" }, [
              h(Form.Item, { label: "优先级", name: "priority", initialValue: 1 }, h(InputNumber, { min: 1, max: 99, style: { width: "100%" } })),
              h(Form.Item, { label: "启用", name: "enabled", valuePropName: "checked", initialValue: true }, h(Switch))
            ])
          ]))
        ]);
      }

      ReactDOM.createRoot(document.getElementById("root")).render(
        h(ConfigProvider, {
          theme: {
            token: {
              colorPrimary: "#1677ff",
              borderRadius: 8,
              colorBgLayout: "#f4f6f8",
              fontFamily: "Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            },
            components: {
              Button: { controlHeight: 34 },
              Input: { controlHeight: 34 },
              Select: { controlHeight: 34 },
              Table: { headerBg: "#f8fafc", rowHoverBg: "#f5f9ff" }
            }
          }
        }, h(App))
      );
    </script>
  </body>
</html>
