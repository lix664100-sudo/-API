<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShareAI API 管理后台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5/dist/reset.css" />
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/antd@5/dist/antd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ant-design/icons@5/dist/index.umd.min.js"></script>
    <style>
      :root {
        --page-bg: #f4f6f8;
        --panel: #ffffff;
        --panel-soft: #f8fafc;
        --line: #e4e7ec;
        --ink: #101828;
        --muted: #667085;
        --muted-2: #98a2b3;
        --brand: #1677ff;
        --brand-soft: #eaf2ff;
        --success: #16a34a;
        --warning: #d97706;
        --danger: #dc2626;
        --shadow: 0 18px 45px rgba(16, 24, 40, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        background: var(--page-bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      }

      .boot-screen,
      .login-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(135deg, rgba(22, 119, 255, 0.08), transparent 36%),
          var(--page-bg);
      }

      .login-panel {
        width: min(420px, 100%);
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: var(--shadow);
      }

      .login-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 22px;
      }

      .login-title {
        margin: 0;
        font-size: 20px;
        line-height: 1.2;
      }

      .login-subtitle {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .update-output {
        max-height: 420px;
        margin: 0;
        overflow: auto;
        padding: 12px;
        border: 1px solid #1f2937;
        border-radius: 8px;
        background: #101828;
        color: #d1fadf;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        min-height: 70px;
        padding: 0 28px;
        border-bottom: 1px solid rgba(228, 231, 236, 0.92);
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(18px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border-radius: 8px;
        color: #fff;
        background: #111827;
        font-weight: 800;
      }

      .brand-title {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
      }

      .brand-subtitle {
        margin: 3px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      .content {
        width: min(1560px, calc(100% - 32px));
        margin: 20px auto 34px;
      }

      .metrics-grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 14px;
      }

      .metric {
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 86px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .metric-icon {
        display: grid;
        place-items: center;
        flex: 0 0 38px;
        width: 38px;
        height: 38px;
        border-radius: 8px;
        color: var(--brand);
        background: var(--brand-soft);
        font-size: 18px;
      }

      .metric-label {
        color: var(--muted);
        font-size: 12px;
      }

      .metric-value {
        margin-top: 5px;
        font-size: 22px;
        font-weight: 760;
        line-height: 1;
      }

      .metric-value.compact {
        font-size: 15px;
        line-height: 1.35;
        white-space: normal;
      }

      .capacity-panel {
        overflow: hidden;
        margin-bottom: 14px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel);
      }

      .capacity-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(90deg, rgba(22, 119, 255, 0.055), rgba(255, 255, 255, 0));
      }

      .capacity-title {
        display: flex;
        align-items: center;
        gap: 9px;
        font-size: 14px;
        font-weight: 760;
      }

      .capacity-subtitle {
        color: var(--muted);
        font-size: 12px;
      }

      .capacity-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .capacity-lane {
        min-width: 0;
        padding: 17px 18px 16px;
      }

      .capacity-lane + .capacity-lane {
        border-left: 1px solid var(--line);
      }

      .capacity-lane-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .capacity-lane-name {
        display: flex;
        align-items: center;
        gap: 9px;
        font-size: 14px;
        font-weight: 740;
      }

      .capacity-lane-icon {
        display: grid;
        place-items: center;
        width: 30px;
        height: 30px;
        border-radius: 8px;
        color: #1677ff;
        background: #eaf2ff;
      }

      .capacity-lane.chat .capacity-lane-icon {
        color: #7c3aed;
        background: #f3e8ff;
      }

      .capacity-stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 10px;
      }

      .capacity-stat-label {
        color: var(--muted);
        font-size: 11px;
      }

      .capacity-stat-value {
        margin-top: 3px;
        font-size: 18px;
        font-weight: 760;
        line-height: 1.1;
      }

      .capacity-stat.running .capacity-stat-value {
        color: var(--brand);
      }

      .capacity-stat.idle .capacity-stat-value {
        color: var(--success);
      }

      .workspace {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
        align-items: start;
      }

      .panel {
        min-width: 0;
        overflow: visible;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        min-height: 62px;
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
      }

      .panel-title {
        margin: 0;
        font-size: 16px;
        font-weight: 760;
      }

      .panel-desc {
        margin: 3px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      .table-wrap {
        min-width: 0;
        overflow: visible;
        padding: 14px 18px 18px;
      }

      .filters {
        display: grid;
        grid-template-columns: minmax(240px, 1fr) 160px 160px auto;
        gap: 10px;
        margin-bottom: 12px;
      }

      .channel-name-cell {
        min-width: 0;
      }

      .primary-text {
        color: var(--ink);
        font-weight: 720;
      }

      .secondary-text {
        margin-top: 3px;
        color: var(--muted);
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .task-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 10px;
        margin-top: 8px;
        font-size: 12px;
        line-height: 1.5;
      }

      .task-meta-item {
        display: inline-flex;
        align-items: center;
        max-width: 100%;
        padding: 2px 8px;
        border: 1px solid #d7e3f5;
        border-radius: 6px;
        background: #f8fafc;
        color: #344054;
      }

      .task-meta-label {
        flex: 0 0 auto;
        color: var(--muted);
      }

      .proxy-cell {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
        min-width: 0;
      }

      .proxy-expire {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.2;
        white-space: nowrap;
      }

      .proxy-host {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.2;
        max-width: 140px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .proxy-expire.expired {
        color: var(--danger);
      }

      .proxy-state {
        font-size: 12px;
        line-height: 1.2;
        white-space: nowrap;
      }

      .proxy-state.ok {
        color: #027a48;
      }

      .proxy-state.failed {
        color: var(--danger);
      }

      .proxy-state.pending {
        color: var(--muted);
      }

      .account-usage {
        display: grid;
        gap: 3px;
        min-width: 0;
      }

      .account-usage strong {
        color: var(--ink);
        font-size: 13px;
      }

      .account-usage span {
        color: var(--muted);
        font-size: 12px;
      }

      .routing-share {
        display: grid;
        gap: 5px;
        width: 132px;
      }

      .routing-share-meta {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1;
      }

      .routing-share-weight {
        color: var(--ink);
        font-size: 13px;
        font-weight: 650;
      }

      .routing-weight-control {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 112px;
        align-items: center;
        gap: 18px;
        min-height: 38px;
      }

      .routing-weight-input {
        width: 100%;
      }

      .mono {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .detail-body {
        min-width: 0;
        overflow: visible;
        padding: 16px 18px 18px;
      }

      .detail-hero {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--line);
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin: 14px 0;
      }

      .detail-stat {
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-soft);
      }

      .detail-stat-label {
        color: var(--muted);
        font-size: 12px;
      }

      .detail-stat-value {
        margin-top: 4px;
        font-size: 18px;
        font-weight: 760;
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 10px 0 12px;
      }

      .section-title h3 {
        margin: 0;
        font-size: 14px;
      }

      .operations {
        margin-top: 14px;
      }

      .operation-body {
        min-width: 0;
        overflow: visible;
        padding: 14px 18px 18px;
      }

      .task-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .task-summary-grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        margin-bottom: 12px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-soft);
      }

      .task-summary-item {
        min-width: 0;
        padding: 12px 14px;
        border-right: 1px solid var(--line);
      }

      .task-summary-item:last-child {
        border-right: 0;
      }

      .task-summary-label {
        color: var(--muted);
        font-size: 12px;
      }

      .task-summary-value {
        margin-top: 5px;
        font-size: 20px;
        font-weight: 760;
        line-height: 1;
      }

      .task-filters {
        display: grid;
        grid-template-columns: 220px 180px 180px 1fr;
        gap: 10px;
        margin-bottom: 12px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0 12px;
      }

      .model-route-list {
        display: grid;
        gap: 10px;
      }

      .model-route-row {
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8fafc;
      }

      .model-route-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .model-route-title {
        font-size: 13px;
        font-weight: 760;
      }

      .model-route-grid {
        display: grid;
        grid-template-columns: 1fr 1.2fr 76px;
        gap: 0 10px;
      }

      .model-tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .code-box {
        margin: 0;
        padding: 14px;
        overflow: visible;
        border: 1px solid #1f2937;
        border-radius: 8px;
        background: #101828;
        color: #d1fadf;
        font-size: 12px;
        line-height: 1.65;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .api-doc-stack {
        display: grid;
        gap: 14px;
      }

      .api-doc-section {
        display: grid;
        gap: 10px;
      }

      .api-doc-title {
        margin: 0;
        font-size: 14px;
        font-weight: 760;
      }

      .api-doc-copy {
        margin: -4px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      .task-thumb {
        width: 86px;
        height: 62px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #f2f4f7;
      }

      .task-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .toolbar-note {
        color: var(--muted);
        font-size: 12px;
      }

      .error-text {
        margin-top: 4px;
        color: var(--danger);
        font-size: 12px;
        line-height: 1.45;
      }

      .task-error-detail {
        max-width: 980px;
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .task-error-detail summary {
        cursor: pointer;
        color: #475569;
        user-select: none;
      }

      .task-error-detail pre {
        max-height: 180px;
        margin: 6px 0 0;
        overflow: auto;
        padding: 10px;
        border: 1px solid #fee2e2;
        border-radius: 8px;
        background: #fff7f7;
        color: #991b1b;
        white-space: pre-wrap;
      }

      .task-response {
        max-width: 680px;
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
      }

      .task-json-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(260px, 1fr));
        gap: 8px;
        max-width: 980px;
        margin-top: 8px;
      }

      .task-json-panel {
        min-width: 0;
        overflow: hidden;
        border: 1px solid #1f2937;
        border-radius: 8px;
        background: #101828;
      }

      .task-json-title {
        padding: 7px 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.09);
        color: #e5e7eb;
        background: #111827;
        font-size: 12px;
        font-weight: 760;
      }

      .task-json-code {
        max-height: 260px;
        margin: 0;
        overflow: auto;
        padding: 10px;
        color: #d1fadf;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 11px;
        line-height: 1.5;
        white-space: pre;
        tab-size: 2;
      }

      @media (max-width: 1320px) {
        .metrics-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .workspace {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 780px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
          padding: 14px 18px;
        }

        .content {
          width: min(100% - 20px, 760px);
          margin-top: 12px;
        }

        .metrics-grid,
        .task-summary-grid,
        .detail-grid,
        .form-grid,
        .model-route-grid {
          grid-template-columns: 1fr;
        }

        .capacity-grid {
          grid-template-columns: 1fr;
        }

        .capacity-stats {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .capacity-lane + .capacity-lane {
          border-top: 1px solid var(--line);
          border-left: 0;
        }

        .task-summary-item {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .task-summary-item:last-child {
          border-bottom: 0;
        }

        .filters {
          grid-template-columns: 1fr;
        }

        .task-filters {
          grid-template-columns: 1fr;
        }

        .task-json-grid {
          grid-template-columns: 1fr;
        }

        .panel-header,
        .detail-hero {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const { useEffect, useMemo, useState } = React;
      const {
        Alert,
        Button,
        Col,
        ConfigProvider,
        Empty,
        Form,
        Image,
        Input,
        InputNumber,
        message,
        Modal,
        Popconfirm,
        Progress,
        Row,
        Select,
        Slider,
        Space,
        Spin,
        Switch,
        Table,
        Tabs,
        Tag,
        Tooltip,
        Typography,
        Upload
      } = antd;
      const Icon = window.icons || {};
      const h = React.createElement;

      const channelTypeOptions = [
        { label: "ShareAI账号", value: "shareai" }
      ];
      const channelTypeLabels = {
        shareai: "ShareAI账号",
        chatplus: "聊天生图",
        drawing: "绘图站"
      };

      const fallbackModelOptions = [
        { label: "ChatGPT-Image-2 / 默认", value: 1 },
        { label: "Nano-Banana-Pro", value: 2 },
        { label: "Nano-Banana", value: 3 }
      ];

      const chatModelDefaults = [
        { key: "gpt", name: "GPT", carType: "chatgpt", model: "gpt-5-5-instant", strategy: "balanced", enabled: true, default: true },
        { key: "grok", name: "Grok", carType: "grok", model: "", strategy: "balanced", enabled: true, default: false },
        { key: "gemini", name: "Gemini", carType: "gemini", model: "", strategy: "thinking", enabled: true, default: false }
      ];

      const chatStrategyOptions = [
        { label: "智能随机", value: "balanced" },
        { label: "空闲优先", value: "idle" },
        { label: "绘图额度优先", value: "image" },
        { label: "思考能力优先", value: "thinking" },
        { label: "低负载优先", value: "speed" }
      ];

      const imageStorageModeOptions = [
        { label: "智能转存：临时链接才保存到本服务器", value: "smart" },
        { label: "全部转存：所有返回图片都保存到本服务器", value: "always" },
        { label: "不转存：全部按上游原链接返回", value: "never" }
      ];

      async function api(path, options = {}) {
        const { timeoutMs = 0, ...requestOptions } = options;
        const isForm = requestOptions.body instanceof FormData;
        const hasBody = requestOptions.body !== undefined && requestOptions.body !== null;
        const body = hasBody && !isForm && typeof requestOptions.body !== "string" ? JSON.stringify(requestOptions.body) : requestOptions.body;
        const controller = timeoutMs > 0 ? new AbortController() : null;
        const timer = controller ? setTimeout(() => controller.abort(), timeoutMs) : null;
        try {
          const response = await fetch(path, {
            ...requestOptions,
            body,
            signal: requestOptions.signal || controller?.signal,
            headers: {
              ...(hasBody && !isForm ? { "content-type": "application/json" } : {}),
              ...(requestOptions.headers || {})
            }
          });
          const data = await response.json().catch(() => null);
          if (!response.ok || data?.ok === false) throw new Error(data?.message || "请求失败");
          return data?.data ?? data;
        } catch (error) {
          if (error?.name === "AbortError") {
            const timeoutError = new Error("服务器更新时间较长，页面已停止等待，请稍后刷新查看结果。");
            timeoutError.code = "REQUEST_TIMEOUT";
            throw timeoutError;
          }
          if (error instanceof TypeError && !error.code) error.code = "NETWORK_ERROR";
          throw error;
        } finally {
          if (timer) clearTimeout(timer);
        }
      }

      async function withTimeout(promise, timeoutMs, fallback) {
        let timer = null;
        try {
          return await Promise.race([
            promise.finally(() => clearTimeout(timer)),
            new Promise((resolve) => {
              timer = setTimeout(() => resolve(fallback), timeoutMs);
            })
          ]);
        } catch {
          clearTimeout(timer);
          return fallback;
        }
      }

      function numberValue(value) {
        const next = Number(value);
        return Number.isFinite(next) ? next : 0;
      }

      function routingWeightValue(value) {
        const weight = Math.round(Number(value || 1));
        return Math.min(100, Math.max(1, Number.isFinite(weight) ? weight : 1));
      }

      function RoutingWeightInput({ value, onChange }) {
        const weight = routingWeightValue(value);
        const update = (nextValue) => onChange?.(routingWeightValue(nextValue));
        return h("div", { className: "routing-weight-control" }, [
          h(Slider, {
            key: "slider",
            min: 1,
            max: 100,
            value: weight,
            onChange: update,
            tooltip: { formatter: (current) => `${current} 份` },
            "aria-label": "分流比例"
          }),
          h(InputNumber, {
            key: "number",
            className: "routing-weight-input",
            min: 1,
            max: 100,
            value: weight,
            onChange: update,
            addonAfter: "份",
            "aria-label": "分流比例数值"
          })
        ]);
      }

      function valueText(value) {
        return value === null || value === undefined || value === "" ? "-" : value;
      }

      function prettyJson(value) {
        if (value === null || value === undefined || value === "") return "";
        try {
          const parsed = typeof value === "string" ? JSON.parse(value) : value;
          return JSON.stringify(parsed, null, 2);
        } catch (_error) {
          return String(value);
        }
      }

      function isChatLoginErrorText(value) {
        return /\b(401|403)\b|身份验证失败|请重新登录|重新登陆|未登录|未登陆|其他设备登|聊天站登录状态|掉线/.test(String(value || ""));
      }

      function drawingUpstreamErrorText(value) {
        const text = String(value || "");
        const relayFailure = text.match(/中转接口请求失败[^\d]*状态码\s*[:：]\s*(\d{3})/);
        return relayFailure
          ? `绘图站上游服务异常（${relayFailure[1]}），不是额度不足，请稍后重试。`
          : text;
      }

      function taskErrorText(row) {
        if (row?.status === "interrupted") return "";
        const text = row?.errorMessage || row?.responseJson?.message || "";
        if (!text) return "";
        if (isChatLoginErrorText(text)) {
          return "聊天站掉线，系统会自动重登和换车。若连续失败，请检测聊天账号后重试。";
        }
        return drawingUpstreamErrorText(text);
      }

      function taskRawErrorText(row) {
        if (row?.status === "interrupted") return "";
        const text = row?.errorMessage || row?.responseJson?.message || "";
        return text && text !== taskErrorText(row) ? text : "";
      }

      function taskReturnJson(row) {
        if (row.status === "interrupted") return null;
        if (row.status === "failed" && (row.responseJson || row.errorMessage)) {
          return { ok: false, message: taskErrorText(row) || "任务失败" };
        }
        if (row.responseJson) return row.responseJson;
        if (row.errorMessage) return { ok: false, message: row.errorMessage, attempts: row.attempts || [] };
        if (row.responseText) return { content: row.responseText };
        if (row.raw && row.raw.queued !== true) return row.raw;
        return null;
      }

      function taskJsonPanel(title, value) {
        const text = prettyJson(value);
        return text
          ? h("div", { className: "task-json-panel", key: title }, [
              h("div", { className: "task-json-title", key: "title" }, title),
              h("pre", { className: "task-json-code", key: "code" }, text)
            ])
          : null;
      }

      function taskJsonGrid(row) {
        const panels = [
          taskJsonPanel("发送 JSON", row.requestJson),
          taskJsonPanel("返回 JSON", taskReturnJson(row))
        ].filter(Boolean);
        return panels.length ? h("div", { className: "task-json-grid" }, panels) : null;
      }

      function formatDateTime(value) {
        if (value === null || value === undefined || value === "") return "-";
        const date = new Date(value);
        if (!Number.isFinite(date.getTime())) return value;
        return date.toLocaleString("zh-CN", {
          timeZone: "Asia/Shanghai",
          hour12: false,
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        }).replace(/\//g, "-");
      }

      function taskNetworkLabel(row) {
        const network = row?.network || {};
        if (network.proxyConfigured === true) return network.proxyRealIp || network.proxyLabel || "已配置代理";
        if (network.proxyConfigured === false) return network.proxyLabel || "默认服务器IP";
        return "";
      }

      function taskMetaLine(row) {
        const meta = row?.requestMeta || {};
        const items = [
          meta.callerIp ? ["调用IP", meta.callerIp] : null,
          meta.calledAt ? ["调用时间", formatDateTime(meta.calledAt)] : null,
          taskNetworkLabel(row) ? ["代理", taskNetworkLabel(row)] : null
        ].filter(Boolean);
        return items.length
          ? h("div", { className: "task-meta" }, items.map(([label, value]) =>
              h("span", { className: "task-meta-item", key: label }, [
                h("span", { className: "task-meta-label", key: "label" }, `${label}：`),
                h("span", { key: "value" }, value)
              ])
            ))
          : null;
      }

      function formatBytes(value) {
        const bytes = Number(value || 0);
        if (!Number.isFinite(bytes) || bytes <= 0) return "0 B";
        const units = ["B", "KB", "MB", "GB", "TB"];
        let size = bytes;
        let index = 0;
        while (size >= 1024 && index < units.length - 1) {
          size /= 1024;
          index += 1;
        }
        return `${size >= 10 || index === 0 ? Math.round(size) : size.toFixed(1)} ${units[index]}`;
      }

      function imageStorageModeLabel(value) {
        const map = {
          smart: "智能转存",
          always: "全部转存",
          never: "不转存"
        };
        return map[value] || "智能转存";
      }

      function accountQuotaText(account, channel) {
        if (channel?.type === "shareai") {
          const drawing = abilityStatus(account, "drawing");
          const chatplus = abilityStatus(account, "chatplus");
          return `绘图 ${quotaPairText(drawing.quota ?? account.quota, drawing.balance ?? account.balance ?? account.quota)}｜聊天 剩余 ${valueText(chatplus.balance)}`;
        }
        const balance = numberValue(account.balance ?? account.quota);
        const quota = numberValue(account.quota);
        if (channel?.type === "chatplus") return account.status === "unknown" ? "-" : `剩余 ${balance}`;
        return `${quota}/${balance}`;
      }

      function accountQuotaResetText(account, channel) {
        if (channel?.type === "shareai") {
          const drawing = abilityStatus(account, "drawing");
          const chatplus = abilityStatus(account, "chatplus");
          const parts = [
            drawing.quotaResetAt ? `绘图 ${formatDateTime(drawing.quotaResetAt)}` : "",
            chatplus.quotaResetAt ? `聊天 ${formatDateTime(chatplus.quotaResetAt)}` : ""
          ].filter(Boolean);
          return parts.length ? parts.join("｜") : "-";
        }
        return formatDateTime(account.quotaResetAt);
      }

      function accountExpireText(account, channel) {
        if (channel?.type === "shareai") {
          const drawing = abilityStatus(account, "drawing");
          const chatplus = abilityStatus(account, "chatplus");
          return formatDateTime(drawing.expireAt || chatplus.expireAt || account.expireAt);
        }
        return formatDateTime(account.expireAt);
      }

      function channelQuotaText(channel, stats = {}) {
        if (channel?.type === "shareai") {
          return `绘图 ${quotaPairText(stats.drawingQuota, stats.drawingBalance)}｜聊天 剩余 ${valueText(stats.chatBalance)}`;
        }
        if (channel?.type === "chatplus") return `剩余 ${numberValue(stats.balance)}`;
        return `${numberValue(stats.quota)}/${numberValue(stats.balance)}`;
      }

      function channelTypeName(type) {
        return channelTypeLabels[type] || type || "-";
      }

      function channelBaseUrl(channel) {
        if (channel?.type === "shareai") {
          const settings = channel.settings || {};
          return `绘图 ${settings.drawingBaseUrl || "-"} / 聊天 ${settings.chatBaseUrl || "-"}`;
        }
        return channel?.settings?.baseUrl || "-";
      }

      function abilityStatus(account, key) {
        return account?.meta?.abilities?.[key] || {};
      }

      function quotaPairText(quota, balance) {
        if ([quota, balance].every((item) => item === null || item === undefined || item === "")) return "-";
        return `${valueText(quota)}/${valueText(balance)}`;
      }

      function accountBalanceForTotal(account, channel) {
        if (channel?.type === "shareai") {
          const drawing = abilityStatus(account, "drawing");
          const chatplus = abilityStatus(account, "chatplus");
          return numberValue(drawing.balance ?? account.balance ?? account.quota) + numberValue(chatplus.balance);
        }
        return numberValue(account.balance ?? account.quota);
      }

      function chatModelKey(value) {
        return String(value || "").trim().toLowerCase();
      }

      function chatModelsForChannel(channel) {
        const settings = channel?.settings || {};
        const source = Array.isArray(settings.chatModels) && settings.chatModels.length ? settings.chatModels : chatModelDefaults;
        const defaultKey = chatModelKey(settings.defaultChatModel) || source.find((item) => item.default)?.key || "gpt";
        return source.map((item, index) => {
          const fallback = chatModelDefaults[index] || {};
          const key = chatModelKey(item?.key || fallback.key || `model-${index + 1}`);
          return {
            key,
            name: item?.name || fallback.name || key,
            carType: item?.carType || fallback.carType || "",
            model: item?.model || fallback.model || "",
            strategy: item?.strategy || fallback.strategy || "balanced",
            enabled: item?.enabled !== false,
            default: key === defaultKey || item?.default === true
          };
        });
      }

      function chatModelSelectOptions(channel) {
        return chatModelsForChannel(channel)
          .filter((item) => item.enabled)
          .map((item) => ({ label: item.default ? `${item.name} / 默认` : item.name, value: item.key }));
      }

      function statusInfo(status) {
        const map = {
          ok: ["success", "可用"],
          disconnected: ["warning", "自动换线中"],
          quota_empty: ["warning", "额度不足"],
          error: ["error", "异常"],
          success: ["success", "成功"],
          failed: ["error", "失败"],
          cancelled: ["default", "已取消"],
          processing: ["processing", "处理中"],
          waiting_upstream: ["processing", "等待上游"],
          interrupted: ["warning", "结果待确认"],
          disabled: ["default", "已停用"],
          empty: ["warning", "未绑定账号"],
          unknown: ["default", "未检测"]
        };
        return map[status] || ["processing", status || "处理中"];
      }

      function statusTag(status) {
        const [color, text] = statusInfo(status);
        return h(Tag, { color }, text);
      }

      function pipeProxyExpireText(value) {
        const parts = String(value || "").trim().split("|").map((part) => part.trim());
        if (parts.length < 5) return "";
        const [host, port, username, password, expiresAt] = parts;
        return host && port && username && password && expiresAt ? expiresAt : "";
      }

      function isPipeProxyExpired(value) {
        const expiresAt = pipeProxyExpireText(value);
        if (!expiresAt) return false;
        const dateText = /^\d{4}-\d{2}-\d{2}$/.test(expiresAt) ? `${expiresAt}T23:59:59+08:00` : expiresAt;
        const date = new Date(dateText);
        return Number.isFinite(date.getTime()) && date.getTime() < Date.now();
      }

      function proxyHostText(value) {
        const text = String(value || "").trim();
        if (!text) return "";
        const pipeParts = text.split("|").map((part) => part.trim());
        if (pipeParts.length >= 4 && pipeParts[0]) return pipeParts[0];
        try {
          return new URL(/^[a-z][a-z0-9+.-]*:\/\//i.test(text) ? text : `http://${text}`).hostname || "已配置";
        } catch (_error) {
          return "已配置";
        }
      }

      function isIpAddress(value) {
        const text = String(value || "").trim();
        return /^(?:(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)\.){3}(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)$/.test(text)
          || /^(?:[a-f0-9]{1,4}:){2,}[a-f0-9:.]{1,}$/i.test(text);
      }

      function proxyRealIpText(check) {
        const realIp = String(check?.realIp || "").trim();
        if (isIpAddress(realIp)) return realIp;
        const legacyIp = String(check?.ip || "").trim();
        return isIpAddress(legacyIp) ? legacyIp : "";
      }

      function proxyCell(value, row) {
        if (!value) return h(Tag, { color: "default" }, "服务器IP");
        const expiresAt = pipeProxyExpireText(value);
        const expired = isPipeProxyExpired(value);
        const check = row?.meta?.proxyCheck || {};
        const status = expired ? "failed" : check.status === "ok" ? "ok" : check.status === "failed" ? "failed" : "pending";
        const statusText = expired ? "已到期" : status === "ok" ? "正常" : status === "failed" ? "不可用" : "等待任务检测";
        const color = status === "ok" ? "green" : status === "failed" ? "red" : "default";
        const hostText = proxyHostText(value);
        const realIpText = proxyRealIpText(check);
        const content = h("div", { className: "proxy-cell" }, [
          h(Tag, { color, style: { marginInlineEnd: 0 }, key: "ip" }, realIpText || hostText),
          realIpText && hostText && realIpText !== hostText
            ? h("span", { className: "proxy-host", key: "host", title: hostText }, `代理域名 ${hostText}`)
            : null,
          h("span", { className: `proxy-state ${status}`, key: "status" }, statusText),
          expiresAt ? h("span", { className: `proxy-expire${expired ? " expired" : ""}`, key: "expire" }, `到期 ${expiresAt}`) : null
        ]);
        return check.message && status === "failed" ? h(Tooltip, { title: check.message }, content) : content;
      }

      function taskTypeLabel(type) {
        const map = {
          chat: "对话",
          img2img: "图生图",
          text2img: "文生图"
        };
        return map[type] || type || "-";
      }

      function taskChannelGroup(row) {
        if (row?.channelType === "drawing") return "drawing";
        if (row?.channelType === "chatplus") return "chatplus";
        const text = `${row?.channelName || ""} ${row?.channelId || ""}`;
        if (/绘图站|drawing/i.test(text)) return "drawing";
        if (/聊天|chatplus/i.test(text)) return "chatplus";
        return "other";
      }

      function taskChannelGroupLabel(value) {
        if (value === "drawing") return "绘图站";
        if (value === "chatplus") return "聊天";
        return "其他";
      }

      function dateKeyInShanghai(value) {
        const date = new Date(value || Date.now());
        if (!Number.isFinite(date.getTime())) return "";
        return new Intl.DateTimeFormat("en-CA", {
          timeZone: "Asia/Shanghai",
          year: "numeric",
          month: "2-digit",
          day: "2-digit"
        }).format(date);
      }

      function taskTime(row) {
        if (Number.isFinite(Number(row?.time))) return Number(row.time);
        const time = Date.parse(row?.createdAt || row?.completedAt || row?.updatedAt || "");
        return Number.isFinite(time) ? time : 0;
      }

      function taskGeneratedImageCount(row) {
        if (Number.isFinite(Number(row?.successImages))) return Number(row.successImages);
        const urls = Array.isArray(row?.imageUrls) ? row.imageUrls.filter(Boolean).length : 0;
        if (urls) return urls;
        if (row?.status === "success" && row?.taskType !== "chat") return numberValue(row.imageCount);
        return 0;
      }

      function summarizeTaskRange(source, predicate) {
        const items = source.filter(predicate);
        return {
          tasks: items.length,
          successImages: items.reduce((sum, item) => sum + (item.status === "success" ? taskGeneratedImageCount(item) : 0), 0),
          failedTasks: items.filter((item) => item.status === "failed").length
        };
      }

      function summarizeTasks(source) {
        const now = Date.now();
        const todayKey = dateKeyInShanghai(now);
        const sevenDaysAgo = now - 7 * 24 * 60 * 60 * 1000;
        return {
          today: summarizeTaskRange(source, (item) => dateKeyInShanghai(taskTime(item)) === todayKey),
          week: summarizeTaskRange(source, (item) => taskTime(item) >= sevenDaysAgo)
        };
      }

      function formatDuration(ms) {
        if (!Number.isFinite(ms) || ms < 0) return "-";
        const totalSeconds = Math.max(0, Math.floor(ms / 1000));
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        if (hours) return `${hours}时${minutes}分${seconds}秒`;
        if (minutes) return `${minutes}分${seconds}秒`;
        return `${seconds}秒`;
      }

      function taskDuration(task, now) {
        const start = Date.parse(task.createdAt || task.raw?.created_at || "");
        if (!Number.isFinite(start)) return "-";
        const done = ["success", "failed", "cancelled", "interrupted"].includes(task.status)
          ? Date.parse(task.completedAt || task.updatedAt || "")
          : now;
        if (!Number.isFinite(done)) return "-";
        const text = formatDuration(done - start);
        return ["success", "failed", "cancelled", "interrupted"].includes(task.status) ? text : `已耗时 ${text}`;
      }

      function channelName(config, channelId) {
        return config?.channels?.find((item) => item.id === channelId)?.name || channelId || "-";
      }

      function getChannelStatus(channel, relatedAccounts) {
        if (channel.enabled === false) return "disabled";
        if (!relatedAccounts.length) return "empty";
        if (relatedAccounts.some((item) => item.enabled !== false && item.status === "disconnected")) return "disconnected";
        if (relatedAccounts.some((item) => item.enabled !== false && item.status === "ok")) return "ok";
        if (relatedAccounts.every((item) => item.status === "error" || item.status === "failed")) return "error";
        if (relatedAccounts.some((item) => item.enabled !== false && item.status === "quota_empty")) return "quota_empty";
        return "unknown";
      }

      function getChannelStats(channel, accounts) {
        const related = accounts.filter((item) => item.channelId === channel.id);
        const enabled = related.filter((item) => item.enabled !== false);
        if (channel?.type === "shareai") {
          const drawingQuota = related.reduce((sum, item) => sum + numberValue(abilityStatus(item, "drawing").quota ?? item.quota), 0);
          const drawingBalance = related.reduce((sum, item) => sum + numberValue(abilityStatus(item, "drawing").balance ?? item.balance ?? item.quota), 0);
          const chatBalance = related.reduce((sum, item) => sum + numberValue(abilityStatus(item, "chatplus").balance), 0);
          return {
            accountCount: related.length,
            enabledCount: enabled.length,
            okCount: related.filter((item) => item.status === "ok").length,
            quota: drawingQuota,
            balance: drawingBalance + chatBalance,
            drawingQuota,
            drawingBalance,
            chatBalance,
            status: getChannelStatus(channel, related)
          };
        }
        return {
          accountCount: related.length,
          enabledCount: enabled.length,
          okCount: related.filter((item) => item.status === "ok").length,
          quota: related.reduce((sum, item) => sum + numberValue(item.quota), 0),
          balance: related.reduce((sum, item) => sum + numberValue(item.balance ?? item.quota), 0),
          status: getChannelStatus(channel, related)
        };
      }

            .catch(() => {})

          try {

          }

        const hasShareAIChannel = channels.some((item) => item.type === "shareai");
        const selectedChannel = channels.find((item) => item.id === selectedChannelId) || channels[0] || null;
        const selectedAccounts = selectedChannel ? accounts.filter((item) => item.channelId === selectedChannel.id) : [];

        const channelOptions = useMemo(() => [
          { label: "自动选择", value: "auto" },
          ...channels.map((item) => ({ label: item.name, value: item.id }))
        ], [channels]);

        const chatAccountOptions = useMemo(() => {

          return [
            { label: "自动选择", value: "auto" },
            ...accounts
              .filter((account) => account.enabled !== false && chatIds.has(account.channelId))

                label: `${account.name || account.username || "未命名账号"} / ${channelName(config, account.channelId)}`,
                value: account.id
              }))

        const imageAccountOptions = useMemo(() => [
          { label: "自动选择", value: "auto" },

              value: account.id
            }))
        ], [accounts, config]);

        const chatTestModelOptions = useMemo(() => {
          const selectedAccount = selectedChatAccountValue && selectedChatAccountValue !== "auto"
            ? accounts.find((item) => item.id === selectedChatAccountValue)
            : null;
          const selected = selectedAccount
            ? chatChannels.find((item) => item.id === selectedAccount.channelId)
            : null;

        }, [accounts, chatChannels, selectedChatAccountValue]);

        const drawingModelOptions = useMemo(() => {
          const items = Array.isArray(drawingModels) && drawingModels.length ? drawingModels : fallbackModelOptions;
          return items.map((item) => {
            if (item.label && item.value !== undefined) return item;
            const value = Number(item.id ?? item.value ?? item.model_id ?? item.modelId);
            const name = item.name || item.title || item.code || `模型 ${value}`;
            const code = item.code || item.model || "";

              label: code ? `${name} / ${code}` : name,
              value
            };
          }).filter((item) => Number.isFinite(Number(item.value)));
        }, [drawingModels]);

        function defaultModelForChannel(channelId, sourceChannels = channels, sourceConfig = config) {
          const channel = sourceChannels.find((item) => item.id === channelId);
          return channel?.settings?.defaultModelId || sourceConfig?.defaultModelId || 1;
        }

        function accountIsCooling(account) {
          const until = Date.parse(account?.cooldownUntil || "");
          return Number.isFinite(until) && until > Date.now();
        }

        function accountCooldownText(account) {
          const ms = Math.max(0, Date.parse(account?.cooldownUntil || "") - Date.now());
          return `${Math.max(1, Math.ceil(ms / 60000))} 分钟`;
        }

        function drawingCooldownStatus(account) {
          return abilityStatus(account, "drawing");
        }

        function drawingAccountIsCooling(account) {
          const until = Date.parse(drawingCooldownStatus(account)?.cooldownUntil || "");
          return Number.isFinite(until) && until > Date.now();
        }

        function drawingCooldownText(account) {
          const status = drawingCooldownStatus(account);
          const ms = Math.max(0, Date.parse(status?.cooldownUntil || "") - Date.now());
          return `${Math.max(1, Math.ceil(ms / 60000))} 分钟`;
        }

        const matchingChatAccounts = useMemo(() => {
          const chatIds = new Set(chatChannels.map((item) => item.id));
          return accounts.filter((account) => {
            if (account.enabled === false || !chatIds.has(account.channelId)) return false;
            return !selectedChatAccountValue || selectedChatAccountValue === "auto" || account.id === selectedChatAccountValue;
          });
        }, [accounts, chatChannels, selectedChatAccountValue]);

        const coolingChatAccount = useMemo(() => matchingChatAccounts.find(accountIsCooling) || null, [matchingChatAccounts, nowTick]);
        const chatSubmitBlocked = matchingChatAccounts.length > 0 && matchingChatAccounts.every(accountIsCooling);
        const activeDrawingCooldowns = accounts.filter(drawingAccountIsCooling);
        const activeDrawingCooldownCount = activeDrawingCooldowns.length;
        const nextDrawingCooldownAt = activeDrawingCooldowns.reduce((soonest, account) => {
          const value = Date.parse(drawingCooldownStatus(account)?.cooldownUntil || "");
          return !soonest || value < soonest ? value : soonest;
        }, 0);

        const channelStats = useMemo(() => {
          const map = new Map();
          channels.forEach((channel) => map.set(channel.id, getChannelStats(channel, accounts)));
          return map;
        }, [channels, accounts]);

        const filteredChannels = useMemo(() => {
          const keyword = searchText.trim().toLowerCase();
          return channels.filter((channel) => {
            const stats = channelStats.get(channel.id) || {};
            const haystack = `${channel.name} ${channel.id} ${channelBaseUrl(channel)}`.toLowerCase();
            const keywordOk = !keyword || haystack.includes(keyword);
            const typeOk = typeFilter === "all" || channel.type === typeFilter;
            const statusOk = statusFilter === "all" || stats.status === statusFilter;
            return keywordOk && typeOk && statusOk;
          });
        }, [channels, channelStats, searchText, typeFilter, statusFilter]);

        const totals = useMemo(() => {
          const enabledChannels = channels.filter((item) => item.enabled !== false).length;
          const okAccounts = accounts.filter((item) => item.enabled !== false && item.status === "ok").length;
          const balance = accounts.reduce((sum, item) => sum + accountBalanceForTotal(item, channels.find((channel) => channel.id === item.channelId)), 0);
          const successCount = tasks.filter((item) => item.status === "success").length;
          const failedCount = tasks.filter((item) => item.status === "failed").length;
          return { enabledChannels, okAccounts, balance, successCount, failedCount };
        }, [channels, accounts, tasks]);

        const taskAccountOptions = useMemo(() => {
          const options = new Map();
          accounts.forEach((account) => options.set(account.id, `${account.name || account.username || "未命名账号"}`));
          tasks.forEach((task) => {
            if (task.accountId && !options.has(task.accountId)) options.set(task.accountId, task.accountName || task.accountId);
          });
          statRecords.forEach((record) => {
            if (record.accountId && !options.has(record.accountId)) options.set(record.accountId, record.accountName || record.accountId);
          });
          return [
            { label: "全部账号", value: "all" },
            ...[...options.entries()].map(([value, label]) => ({ label, value }))
          ];
        }, [accounts, tasks, statRecords]);

        const filteredTasks = useMemo(() => {
          return tasks.filter((task) => {
            const accountOk = taskAccountFilter === "all" || task.accountId === taskAccountFilter;
            const channelOk = taskChannelFilter === "all" || taskChannelGroup(task) === taskChannelFilter;
            const statusOk = taskStatusFilter === "all" || task.status === taskStatusFilter;
            return accountOk && channelOk && statusOk;
          });
        }, [tasks, taskAccountFilter, taskChannelFilter, taskStatusFilter]);

        const filteredStatRecords = useMemo(() => {
          return statRecords.filter((record) => {
            const accountOk = taskAccountFilter === "all" || record.accountId === taskAccountFilter;
            const channelOk = taskChannelFilter === "all" || record.channelGroup === taskChannelFilter;
            const statusOk = taskStatusFilter === "all" || record.status === taskStatusFilter;
            return accountOk && channelOk && statusOk;
          });
        }, [statRecords, taskAccountFilter, taskChannelFilter, taskStatusFilter]);

        const taskStats = useMemo(() => summarizeTasks(filteredStatRecords), [filteredStatRecords]);

        const accountTodayUsage = useMemo(() => {
          const today = dateKeyInShanghai(Date.now());
          const usage = new Map();
          statRecords.forEach((record) => {
            if (!record.accountId || (record.day || dateKeyInShanghai(record.time)) !== today) return;
            const current = usage.get(record.accountId) || { drawingImages: 0, chatImages: 0, chats: 0 };
            if (record.taskType === "chat") {
              current.chats += numberValue(record.tasks || 1);
            } else if (record.channelGroup === "chatplus") {
              current.chatImages += numberValue(record.successImages);
            } else {
              current.drawingImages += numberValue(record.successImages);
            }
            usage.set(record.accountId, current);
          });
          return usage;
        }, [statRecords]);

        async function refreshRuntimeStatus() {
          const runtimeData = await api("/api/admin/runtime").catch(() => null);
          if (runtimeData) setRuntimeStatus(runtimeData);
          return runtimeData;
        }

        async function refreshAccountStatus() {
          const nextConfig = await api("/api/config").catch(() => null);
          if (nextConfig) setConfig(nextConfig);
          return nextConfig;
        }

        async function refresh() {
          const [nextConfig, taskList, statsData, storageData, runtimeData] = await Promise.all([
            api("/api/config"),
            api("/api/tasks"),
            api("/api/stats").catch(() => ({ records: [] })),
            api("/api/admin/image-storage").catch(() => null),
            api("/api/admin/runtime").catch(() => null)
          ]);
          setConfig(nextConfig);
          setTasks(taskList);

          if (storageData) setImageStorageStats(storageData);

            model: ""

            ratio_label: nextConfig.defaultRatio || "1:1",

        useEffect(() => {
          refresh().catch((error) => message.error(error.message));
        }, []);

        useEffect(() => {
          const timer = setInterval(() => {
            refreshAccountStatus().catch(() => {});
          }, 5000);
          return () => clearInterval(timer);
        }, []);

        useEffect(() => {
          if (!selectedChannelId && channels[0]) setSelectedChannelId(channels[0].id);
          if (selectedChannelId && channels.length && !channels.some((item) => item.id === selectedChannelId)) {
            setSelectedChannelId(channels[0].id);
          }
        }, [channels, selectedChannelId]);

        useEffect(() => {
          const value = chatForm.getFieldValue("model");
          if (value && !chatTestModelOptions.some((item) => item.value === value)) {
            chatForm.setFieldValue("model", "");
          }
        }, [chatForm, chatTestModelOptions]);

        useEffect(() => {
          if (!selectedEditAccountValue) return;
          const account = accounts.find((item) => item.id === selectedEditAccountValue);
          const channelId = account?.channelId || config?.defaultChannel || "auto";
          const nextModel = defaultModelForChannel(channelId);
          if (nextModel) editForm.setFieldValue("model_id", nextModel);
        }, [selectedEditAccountValue, accounts, channels, config]);

        useEffect(() => {
          if (!tasks.some((item) => ["processing", "queued", "pending", "unknown", "waiting_upstream"].includes(item.status))) return undefined;
          const timer = setInterval(async () => {
            try {
              await api("/api/tasks/refresh-processing", { method: "POST", body: {} });
              const [taskList, nextConfig] = await Promise.all([
                api("/api/tasks"),
                api("/api/config")
              ]);
              setTasks(taskList);
              setConfig(nextConfig);
              await refreshRuntimeStatus();
            } catch (_error) {
              // 下一轮继续刷新，避免临时网络波动打断页面。
            }
          }, 5000);
          return () => clearInterval(timer);
        }, [tasks]);

        useEffect(() => {
          if (numberValue(runtimeStatus?.running?.total) <= 0) return undefined;
          const timer = setInterval(() => {
            refreshRuntimeStatus().catch(() => {});
          }, 5000);
          return () => clearInterval(timer);
        }, [runtimeStatus?.running?.total]);

        useEffect(() => {
          const hasActiveTask = tasks.some((item) => ["processing", "queued", "pending", "unknown", "waiting_upstream"].includes(item.status));
          if (!hasActiveTask && activeDrawingCooldownCount <= 0) return undefined;
          const timer = setInterval(() => {
            const now = Date.now();
            setNowTick(now);
            if (nextDrawingCooldownAt && now >= nextDrawingCooldownAt) {
              refreshRuntimeStatus().catch(() => {});
            }
          }, 1000);
          return () => clearInterval(timer);
        }, [tasks, activeDrawingCooldownCount, nextDrawingCooldownAt]);

        async function testChannel(channelId) {
          const related = accounts.filter((item) => item.channelId === channelId);
          if (!related.length) {
            message.warning("这个渠道还没有绑定账号");
            return;
          }
          setCheckingChannelIds((current) => current.includes(channelId) ? current : [...current, channelId]);
          let ok = 0;
          let failed = 0;
          let skipped = 0;
          for (const account of related) {
            try {
              const result = await api(`/api/accounts/${account.id}/test`, { method: "POST" });
              if (result?.checkSkipped) skipped += 1;
              else ok += 1;
            } catch (_error) {
              failed += 1;
            }
          }
          await refresh().catch(() => {});
          setCheckingChannelIds((current) => current.filter((item) => item !== channelId));
          message.info(`检测完成：${ok} 个完成，${skipped} 个使用中已跳过，${failed} 个需处理`);
        }

        function showUpdateResult(result) {
          const title = result?.success
            ? (result?.skipped ? "已经是最新版" : "更新完成")
            : (result?.skipped ? "未执行更新" : "更新未完成");
          const output = [
            result?.message ? `结果：${result.message}` : "",
            result?.stdout ? `输出：\n${result.stdout}` : "",
            result?.stderr ? `提示：\n${result.stderr}` : ""
          ].filter(Boolean).join("\n\n") || "更新命令执行完成，没有返回内容。";
          Modal.info({
            title,
            width: 760,
            okText: "知道了",
            content: h("pre", { className: "update-output" }, output)
          });
        }

        const updateMessageKey = "admin-code-update";

        function wait(milliseconds) {
          return new Promise((resolve) => setTimeout(resolve, milliseconds));
        }

        async function waitForServerRecovery() {
          for (let attempt = 0; attempt < 45; attempt += 1) {
            const ready = await withTimeout(
              fetch("/api/health", { cache: "no-store" }).then((response) => response.ok),
              2000,
              false
            );
            if (ready) {
              message.success({ key: updateMessageKey, content: "服务器已恢复，正在刷新页面", duration: 2 });
              setTimeout(() => window.location.reload(), 600);
              return true;
            }
            await wait(2000);
          }
          message.warning({ key: updateMessageKey, content: "服务器暂未恢复，请稍后手动刷新页面", duration: 6 });
          return false;
        }

        async function executeUpdate() {
          setUpdating(true);
          message.loading({ key: updateMessageKey, content: "正在后台检查更新，可继续使用页面", duration: 0 });
          try {
            const result = await api("/api/admin/update", { method: "POST", body: {}, timeoutMs: 210000 });
            if (result?.success && !result?.skipped) {
              message.loading({ key: updateMessageKey, content: "更新完成，正在等待服务器重启", duration: 0 });
              await wait(2500);
              await waitForServerRecovery();
              return;
            }
            if (result?.success) message.info({ key: updateMessageKey, content: result?.message || "已经是最新版，无需更新", duration: 4 });
            else if (result?.skipped) message.warning({ key: updateMessageKey, content: result?.message || "未执行更新", duration: 5 });
            else message.error({ key: updateMessageKey, content: result?.message || "更新失败", duration: 5 });
            showUpdateResult(result);
          } catch (error) {
            if (error?.code === "NETWORK_ERROR") {
              message.loading({ key: updateMessageKey, content: "服务器正在重启，正在自动重新连接", duration: 0 });
              await waitForServerRecovery();
            } else if (error?.code === "REQUEST_TIMEOUT") {
              message.warning({ key: updateMessageKey, content: error.message, duration: 8 });
            } else {
              message.error({ key: updateMessageKey, content: error.message, duration: 6 });
            }
          } finally {
            setUpdating(false);
          }
        }

        function runUpdate() {
          Modal.confirm({
            title: "更新线上代码",
            content: "会先检查服务器代码版本；只有发现新版本，才会执行更新命令。",
            okText: "检查并更新",
            cancelText: "取消",
            onOk: () => {
              executeUpdate();
            }
          });
        }

        async function submitChat(values) {
          if (chatSubmitting) return;
          if (chatSubmitBlocked) {
            message.warning(`聊天账号冷却中，约 ${accountCooldownText(coolingChatAccount)} 后再试`);
            return;
          }
          const text = String(values.message || "").trim();
          if (!text && !chatFileList.length) {
            message.warning("请输入对话内容，或上传图片");
            return;
          }
          if (chatFileList.length > 5) {
            message.warning("对话最多上传 5 张图");
            return;
          }
          setChatSubmitting(true);
          setLoading(true);
          try {
            const headers = { Authorization: `Bearer ${config?.apiKey || ""}` };
            const body = chatFileList.length
              ? (() => {
                  const form = new FormData();
                  form.append("message", text);
                  form.append("channel", "auto");
                  if (values.accountId && values.accountId !== "auto") form.append("accountId", values.accountId);
                  if (values.model) form.append("model", values.model);
                  chatFileList.forEach((file) => form.append("image", file.originFileObj));
                  return form;
                })()
              : {
                  message: text,
                  channel: "auto",
                  ...(values.accountId && values.accountId !== "auto" ? { accountId: values.accountId } : {}),
                  ...(values.model ? { model: values.model } : {})
                };
            const result = await api("/v1/chat/completions?wait=0", { method: "POST", headers, body });
            if (result.task) {
              setTasks((current) => [result.task, ...current.filter((item) => String(item.id) !== String(result.task.id))]);
            }
            await refreshRuntimeStatus();
            setChatResult("");
            message.success("对话已提交，任务记录里查看结果和耗时");
          } catch (error) {
            message.error(error.message);
          } finally {
            setChatSubmitting(false);
            setLoading(false);
          }
        }

        async function submitEdit(values) {
          if (!editFileList.length) {
            message.warning("先上传 1 到 3 张源图");

          if (editFileList.length > 3) {
            message.warning("图生图最多上传 3 张源图");

          setLoading(true);
          try {
